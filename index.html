<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Progress — Group Usaha</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4F8;
  --card:#FFFFFF;
  --border:#E2EAF3;
  --text:#1A2A3A;
  --muted:#6A7A8A;
  --hijau-bg:#E2EFDA;--hijau-fg:#375623;--hijau-dot:#52A03E;
  --kuning-bg:#FFF2CC;--kuning-fg:#7F6000;--kuning-dot:#D4A017;
  --merah-bg:#FCE4D6;--merah-fg:#843C0C;--merah-dot:#C0392B;
  --abu-bg:#F2F2F2;--abu-fg:#595959;--abu-dot:#AAAAAA;
  --biru:#2E75B6;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── TOP BAR ─────────────────────────────────────────── */
.topbar{background:#1F4E79;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.topbar-left h1{font-size:15px;font-weight:700;letter-spacing:.3px}
.topbar-left p{font-size:11px;opacity:.7;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.last-update{font-size:11px;opacity:.65}
.edit-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600}
.edit-btn:hover{background:rgba(255,255,255,.25)}

/* ── PHASE LEGEND ────────────────────────────────────── */
.phase-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;overflow-x:auto;white-space:nowrap}
.phase-steps{display:inline-flex;align-items:center;gap:0}
.phase-step{display:flex;align-items:center;gap:0}
.phase-pill{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;white-space:nowrap;cursor:default}
.phase-arrow{color:#CBD5E0;font-size:12px;padding:0 4px}
.ph1{background:#BDD7EE;color:#1F4E79}
.ph2{background:#BDD7EE;color:#1F4E79}
.ph3{background:#FFF2CC;color:#7F6000}
.ph4{background:#F2F2F2;color:#595959}
.ph5{background:#F2F2F2;color:#595959}
.ph-done{background:#E2EFDA!important;color:#375623!important}
.ph-now{background:#2E75B6!important;color:#fff!important}

/* ── LAYOUT ──────────────────────────────────────────── */
.page{max-width:1100px;margin:0 auto;padding:18px 16px 60px}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.sum-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.sum-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.sum-val{font-size:22px;font-weight:700;line-height:1}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:3px}

.entities-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(460px,1fr));gap:14px}
@media(max-width:520px){.entities-grid{grid-template-columns:1fr}}

/* ── ENTITY CARD ─────────────────────────────────────── */
.entity-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.entity-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border)}
.entity-hdr-left{display:flex;align-items:center;gap:10px}
.entity-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.entity-name{font-size:14px;font-weight:700}
.entity-type{font-size:11px;color:var(--muted);margin-top:1px}
.status-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}

/* ── PHASE PROGRESS ──────────────────────────────────── */
.phase-progress{padding:10px 16px;border-bottom:1px solid #F5F8FC;display:flex;align-items:center;gap:6px}
.phase-step-mini{display:flex;align-items:center;gap:5px;flex:1}
.psm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid transparent}
.psm-done{background:#E2EFDA;color:#375623;border-color:#52A03E}
.psm-now{background:#2E75B6;color:#fff;border-color:#2E75B6}
.psm-wait{background:#F2F2F2;color:#AAAAAA;border-color:#E0E0E0}
.phase-line{flex:1;height:2px;border-radius:1px}
.pl-done{background:#52A03E}
.pl-now{background:#2E75B6}
.pl-wait{background:#E0E0E0}
.phase-label{font-size:10px;color:var(--muted);text-align:center;margin-top:6px;display:block}

/* ── DIVISION TABLE ──────────────────────────────────── */
.div-table{width:100%;border-collapse:collapse}
.div-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:7px 16px;border-bottom:1px solid #F0F4F8;text-align:left;background:#FAFCFF}
.div-table td{padding:8px 16px;border-bottom:1px solid #F5F8FC;font-size:12.5px;vertical-align:middle}
.div-table tr:last-child td{border-bottom:none}
.div-table td:first-child{font-weight:600;color:#2a3a4a;width:40%}
.status-dot{display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-note{font-size:11px;color:var(--muted);margin-top:2px}

/* ── BLOCKER ─────────────────────────────────────────── */
.blockers{padding:10px 16px;background:#FFFBF5;border-top:1px solid #F5EEDD}
.blocker-title{font-size:10px;font-weight:700;color:#B8860B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.blocker-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.blocker-item:last-child{margin-bottom:0}
.blocker-dot{width:5px;height:5px;border-radius:50%;background:#C0392B;flex-shrink:0;margin-top:5px}
.blocker-text{font-size:11.5px;color:#6B2C2C;line-height:1.5}

/* ── OUTPUT ──────────────────────────────────────────── */
.outputs{padding:10px 16px;background:#F4FBF0;border-top:1px solid #D8EFD0}
.output-title{font-size:10px;font-weight:700;color:#375623;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.output-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.output-item:last-child{margin-bottom:0}
.output-check{font-size:11px;color:#52A03E;font-weight:700;flex-shrink:0;margin-top:1px}
.output-text{font-size:11.5px;color:#2D5A1B;line-height:1.5}

/* ── FOOTER ──────────────────────────────────────────── */
.card-footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#FAFCFF}
.card-footer-note{font-size:10.5px;color:var(--muted);font-style:italic}
.next-action{font-size:10.5px;font-weight:600;color:#2E75B6}

/* ── EDIT MODAL ──────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:480px;overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.modal-hdr{padding:14px 18px;background:#1F4E79;color:#fff;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:14px;font-weight:700}
.modal-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;opacity:.8}
.modal-body{padding:16px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.modal-field{display:flex;flex-direction:column;gap:4px}
.modal-field label{font-size:11px;font-weight:700;color:#5a6a7a;text-transform:uppercase;letter-spacing:.3px}
.modal-field select,.modal-field input,.modal-field textarea{border:1.5px solid #D0DCEA;border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;color:#1a2a3a}
.modal-field select:focus,.modal-field input:focus,.modal-field textarea:focus{outline:none;border-color:#2E75B6}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-footer{padding:12px 18px;border-top:1px solid #E2EAF3;display:flex;gap:8px;justify-content:flex-end}
.btn-save{background:#2E75B6;color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer}
.btn-cancel{background:none;border:1.5px solid #D0DCEA;color:#5a6a7a;border-radius:7px;padding:8px 16px;font-size:13px;cursor:pointer}

@media print{.topbar .edit-btn,.modal-overlay{display:none!important}.topbar{position:static}}
</style>
</head>
<body>

<!-- ── TOP BAR ─────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <h1>Dashboard Progress — Group Usaha</h1>
    <p id="last-update-text">Update terakhir: —</p>
  </div>
  <div class="topbar-right">
    <span class="last-update" id="period-text"></span>
    <button class="edit-btn" onclick="openEdit()">Update Data</button>
  </div>
</div>

<!-- ── PHASE LEGEND ──────────────────────────────────── -->
<div class="phase-bar">
  <div class="phase-steps">
    <div class="phase-step">
      <div class="phase-pill ph-done" title="Selesai">1 · Pisahkan Rekening</div>
      <div class="phase-arrow">›</div>
    </div>
    <div class="phase-step">
      <div class="phase-pill ph-done" title="Selesai">2 · Pemetaan Historis</div>
      <div class="phase-arrow">›</div>
    </div>
    <div class="phase-step">
      <div class="phase-pill ph-now" title="Sedang berjalan">3 · Flow Operasional</div>
      <div class="phase-arrow">›</div>
    </div>
    <div class="phase-step">
      <div class="phase-pill ph4">4 · Pencatatan Real-time</div>
      <div class="phase-arrow">›</div>
    </div>
    <div class="phase-step">
      <div class="phase-pill ph5">5 · Laporan Keuangan Utuh</div>
    </div>
  </div>
</div>

<div class="page">

  <!-- ── SUMMARY ROW ──────────────────────────────────── -->
  <div class="summary-row" id="summary-row"></div>

  <!-- ── ENTITIES ─────────────────────────────────────── -->
  <div class="entities-grid" id="entities-grid"></div>

</div>

<!-- ── EDIT MODAL ────────────────────────────────────── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-title">Update Progress</h2>
      <button class="modal-close" onclick="closeEdit()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEdit()">Batal</button>
      <button class="btn-save" onclick="saveEdit()">Simpan</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// DATA — update bagian ini setiap minggu
// ════════════════════════════════════════════════════════
const META = {
  lastUpdate: "16 April 2025",
  periode: "Minggu 3, April 2025",
  catatan: "Semua entitas di fase 3. Retail HP masih deadlock menunggu keputusan kasir."
};

const ENTITIES = [
  {
    id: "restoran",
    nama: "Restoran",
    jenis: "F&B",
    warna: "375623",
    bg: "E2EFDA",
    fase: 3, // fase aktif saat ini (1-5)
    status: "In Progress",   // In Progress / Deadlock / Baru Identifikasi
    divisi: [
      { nama: "Kas & Cash Flow",       status: "hijau",  note: "Kas harian terpantau" },
      { nama: "Flow Operasional",      status: "kuning", note: "HPP per item dalam proses" },
      { nama: "Pencatatan Stok",       status: "merah",  note: "Belum ada PIC stok yang jelas" },
      { nama: "Data Harian",           status: "kuning", note: "Sebagian tercatat" },
      { nama: "Laporan Keuangan",      status: "kuning", note: "Parsial — kas & gross profit tersedia" },
    ],
    output: [
      "Pergerakan kas harian terpantau",
      "HPP makro tersedia",
      "Gross Profit mulai terlihat",
      "Arus Kas tersedia",
    ],
    blocker: [
      "Belum ada PIC yang bertanggung jawab atas data stok",
      "Purchasing masih merangkap kasir dan service",
    ],
    nextAction: "Tetapkan PIC stok & kasir minggu ini"
  },
  {
    id: "retailhp",
    nama: "Retail HP",
    jenis: "Retail Elektronik",
    warna: "843C0C",
    bg: "FCE4D6",
    fase: 3,
    status: "Deadlock",
    divisi: [
      { nama: "Kas & Cash Flow",       status: "hijau",  note: "Pergerakan kas bisa di-trace" },
      { nama: "Flow Operasional",      status: "merah",  note: "One man show — kepala toko pegang semua" },
      { nama: "Pencatatan Stok",       status: "merah",  note: "Software tidak support serial number" },
      { nama: "Data Harian",           status: "merah",  note: "Tidak ada yang input data secara terpisah" },
      { nama: "Laporan Keuangan",      status: "merah",  note: "HPP & Gross Profit belum bisa disusun" },
    ],
    output: [
      "Pergerakan kas sudah bisa di-trace",
    ],
    blocker: [
      "Belum ada keputusan tambah kasir dedicated",
      "Software tidak support tracking serial number HP",
      "Kepala toko one man show — tidak ada kapasitas untuk data",
    ],
    nextAction: "Keputusan owner: tambah kasir & ganti software"
  },
  {
    id: "tokobangunan",
    nama: "Toko Bangunan",
    jenis: "Retail Material",
    warna: "7F3F00",
    bg: "FFF2CC",
    fase: 3,
    status: "Baru Identifikasi",
    divisi: [
      { nama: "Kas & Cash Flow",       status: "hijau",  note: "Pergerakan kas tidak lagi tercampur" },
      { nama: "Flow Operasional",      status: "merah",  note: "1 karyawan pegang semua fungsi" },
      { nama: "Pencatatan Stok",       status: "merah",  note: "Belum ada sistem stok" },
      { nama: "Data Harian",           status: "merah",  note: "Belum ada sistem kasir" },
      { nama: "Laporan Keuangan",      status: "kuning", note: "Rekap penjualan & piutang tersedia" },
    ],
    output: [
      "Pergerakan kas terpantau",
      "Rekap penjualan tersedia",
      "Piutang penjualan terekam",
    ],
    blocker: [
      "1 karyawan tidak punya kapasitas untuk tambah sistem apapun",
      "Belum ada sistem kasir maupun pencatatan stok",
    ],
    nextAction: "Implementasi kasir sederhana di HP (2 minggu)"
  },
  {
    id: "dapurmbg",
    nama: "Dapur MBG",
    jenis: "Food Production",
    warna: "1F4E79",
    bg: "BDD7EE",
    fase: 3,
    status: "In Progress",
    divisi: [
      { nama: "Kas & Cash Flow",       status: "hijau",  note: "Operasional utama terkontrol" },
      { nama: "Flow Operasional",      status: "hijau",  note: "Flow utama (penyewaan dapur) selesai" },
      { nama: "Pencatatan Stok",       status: "kuning", note: "Operasional turunan supplier masih disusun" },
      { nama: "Data Harian",           status: "kuning", note: "Data utama tercatat, turunan belum" },
      { nama: "Laporan Keuangan",      status: "kuning", note: "HPP makro & Gross Profit tersedia, Neraca belum" },
    ],
    output: [
      "Pergerakan kas terkontrol",
      "HPP makro penyewaan dapur tersedia",
      "Gross Profit tersedia",
      "Arus Kas tersedia",
    ],
    blocker: [
      "Flow operasional turunan sebagai supplier belum selesai",
    ],
    nextAction: "Selesaikan flow operasional turunan (2-3 minggu)"
  },
];

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
const STATUS_MAP = {
  hijau:  { bg:"var(--hijau-bg)", fg:"var(--hijau-fg)", dot:"var(--hijau-dot)", label:"Berjalan" },
  kuning: { bg:"var(--kuning-bg)", fg:"var(--kuning-fg)", dot:"var(--kuning-dot)", label:"Sebagian" },
  merah:  { bg:"var(--merah-bg)", fg:"var(--merah-fg)", dot:"var(--merah-dot)", label:"Belum" },
  abu:    { bg:"var(--abu-bg)", fg:"var(--abu-fg)", dot:"var(--abu-dot)", label:"—" },
};

const ENTITY_STATUS = {
  "In Progress":       { bg:"#E2EFDA", fg:"#375623" },
  "Deadlock":          { bg:"#FCE4D6", fg:"#843C0C" },
  "Baru Identifikasi": { bg:"#FFF2CC", fg:"#7F6000" },
};

function scoreEntity(e) {
  const total = e.divisi.length;
  const hijau = e.divisi.filter(d=>d.status==="hijau").length;
  const kuning = e.divisi.filter(d=>d.status==="kuning").length;
  return Math.round((hijau + kuning*0.5) / total * 100);
}

function renderSummary() {
  const total = ENTITIES.length;
  const inprog = ENTITIES.filter(e=>e.status==="In Progress").length;
  const deadlock = ENTITIES.filter(e=>e.status==="Deadlock").length;
  const newid = ENTITIES.filter(e=>e.status==="Baru Identifikasi").length;
  const avgScore = Math.round(ENTITIES.reduce((s,e)=>s+scoreEntity(e),0)/total);

  const cards = [
    { icon:"4", iconBg:"#BDD7EE", iconFg:"#1F4E79", val:total, lbl:"Total Entitas" },
    { icon:"▶", iconBg:"#E2EFDA", iconFg:"#375623", val:inprog, lbl:"In Progress" },
    { icon:"!", iconBg:"#FCE4D6", iconFg:"#843C0C", val:deadlock, lbl:"Deadlock" },
    { icon:"~", iconBg:"#FFF2CC", iconFg:"#7F6000", val:newid, lbl:"Baru Identifikasi" },
    { icon:"%", iconBg:"#E6F1FB", iconFg:"#1F4E79", val:avgScore+"%", lbl:"Rata-rata Progress" },
  ];

  document.getElementById("summary-row").innerHTML = cards.map(c=>`
    <div class="sum-card">
      <div class="sum-icon" style="background:${c.iconBg};color:${c.iconFg}">${c.icon}</div>
      <div>
        <div class="sum-val">${c.val}</div>
        <div class="sum-lbl">${c.lbl}</div>
      </div>
    </div>`).join("");
}

function renderPhase(fase) {
  const phases = ["Pisahkan Rekening","Pemetaan Historis","Flow Operasional","Pencatatan Real-time","Laporan Keuangan"];
  return `<div class="phase-progress">${
    phases.map((ph,i) => {
      const n = i+1;
      const cls = n < fase ? "psm-done" : n === fase ? "psm-now" : "psm-wait";
      const lineCls = n < fase ? "pl-done" : n === fase ? "pl-now" : "pl-wait";
      const last = n === 5;
      return `<div style="display:flex;flex-direction:column;align-items:center;flex:${last?0:1}">
        <div style="display:flex;align-items:center;width:100%">
          <div class="psm ${cls}">${n}</div>
          ${!last ? `<div class="phase-line ${lineCls}"></div>` : ""}
        </div>
        <span class="phase-label">${ph}</span>
      </div>`;
    }).join("")
  }</div>`;
}

function renderDivisi(divisi) {
  return `<table class="div-table">
    <thead><tr>
      <th>Fungsi / Divisi</th>
      <th>Status</th>
      <th>Keterangan</th>
    </tr></thead>
    <tbody>${divisi.map(d => {
      const s = STATUS_MAP[d.status] || STATUS_MAP.abu;
      return `<tr>
        <td>${d.nama}</td>
        <td>
          <div class="status-dot">
            <div class="dot" style="background:${s.dot}"></div>
            <span style="color:${s.fg};font-weight:600;font-size:12px">${s.label}</span>
          </div>
        </td>
        <td style="color:#5a6a7a;font-size:11.5px">${d.note}</td>
      </tr>`;
    }).join("")}</tbody>
  </table>`;
}

function renderEntity(e) {
  const estatus = ENTITY_STATUS[e.status] || ENTITY_STATUS["In Progress"];
  const score = scoreEntity(e);
  const scoreColor = score>=70?"var(--hijau-dot)":score>=40?"var(--kuning-dot)":"var(--merah-dot)";

  return `<div class="entity-card">
    <div class="entity-hdr">
      <div class="entity-hdr-left">
        <div class="entity-icon" style="background:#${e.warna}">${e.nama[0]}</div>
        <div>
          <div class="entity-name">${e.nama}</div>
          <div class="entity-type">${e.jenis}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:700;color:${scoreColor}">${score}%</div>
          <div style="font-size:10px;color:var(--muted)">progress</div>
        </div>
        <div class="status-badge" style="background:${estatus.bg};color:${estatus.fg}">${e.status}</div>
      </div>
    </div>
    ${renderPhase(e.fase)}
    ${renderDivisi(e.divisi)}
    ${e.output.length ? `<div class="outputs">
      <div class="output-title">Output yang sudah bisa dipegang</div>
      ${e.output.map(o=>`<div class="output-item"><span class="output-check">✓</span><span class="output-text">${o}</span></div>`).join("")}
    </div>`:""}
    ${e.blocker.length ? `<div class="blockers">
      <div class="blocker-title">Blocker / Penghambat</div>
      ${e.blocker.map(b=>`<div class="blocker-item"><div class="blocker-dot"></div><span class="blocker-text">${b}</span></div>`).join("")}
    </div>`:""}
    <div class="card-footer">
      <span class="card-footer-note">Next action:</span>
      <span class="next-action">${e.nextAction}</span>
    </div>
  </div>`;
}

function renderAll() {
  document.getElementById("last-update-text").textContent = "Update terakhir: " + META.lastUpdate;
  document.getElementById("period-text").textContent = META.periode;
  renderSummary();
  document.getElementById("entities-grid").innerHTML = ENTITIES.map(renderEntity).join("");
}

// ════════════════════════════════════════════════════════
// EDIT MODAL
// ════════════════════════════════════════════════════════
let editingIdx = null;

function openEdit() {
  editingIdx = null;
  const body = document.getElementById("modal-body");
  document.getElementById("modal-title").textContent = "Update Dashboard";

  body.innerHTML = `
    <div style="font-size:12px;color:#5a6a7a;margin-bottom:4px">Pilih entitas yang ingin diupdate:</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${ENTITIES.map((e,i)=>`
        <button onclick="openEntityEdit(${i})" style="text-align:left;padding:10px 14px;border:1.5px solid #D0DCEA;border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:inherit">
          <div style="width:28px;height:28px;border-radius:7px;background:#${e.warna};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${e.nama[0]}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:#1a2a3a">${e.nama}</div>
            <div style="font-size:11px;color:#6a7a8a">${e.status}</div>
          </div>
        </button>`).join("")}
      <div style="border-top:1px solid #E2EAF3;padding-top:10px;margin-top:4px">
        <div style="font-size:11px;font-weight:700;color:#5a6a7a;margin-bottom:6px">Info Dashboard</div>
        <div class="modal-field">
          <label>Periode</label>
          <input id="edit-periode" value="${META.periode}"/>
        </div>
        <div class="modal-field" style="margin-top:8px">
          <label>Catatan Umum</label>
          <textarea id="edit-catatan">${META.catatan}</textarea>
        </div>
      </div>
    </div>`;
  document.getElementById("modal").classList.add("open");
}

function openEntityEdit(idx) {
  editingIdx = idx;
  const e = ENTITIES[idx];
  document.getElementById("modal-title").textContent = "Update: " + e.nama;

  const statusOpts = ["In Progress","Deadlock","Baru Identifikasi"].map(s=>
    `<option${s===e.status?" selected":""}>${s}</option>`).join("");

  const divFields = e.divisi.map((d,di)=>`
    <div style="display:grid;grid-template-columns:1fr 100px;gap:6px;align-items:center;border-bottom:1px solid #F0F4F8;padding:6px 0">
      <div style="font-size:12px;font-weight:600;color:#2a3a4a">${d.nama}</div>
      <select id="div-${di}-status" style="font-size:12px;padding:4px 6px;border:1.5px solid #D0DCEA;border-radius:6px">
        <option value="hijau"${d.status==="hijau"?" selected":""}>Berjalan</option>
        <option value="kuning"${d.status==="kuning"?" selected":""}>Sebagian</option>
        <option value="merah"${d.status==="merah"?" selected":""}>Belum</option>
      </select>
      <div style="grid-column:span 2">
        <input id="div-${di}-note" value="${d.note}" placeholder="Keterangan..." style="width:100%;font-size:11.5px;padding:4px 8px;border:1.5px solid #D0DCEA;border-radius:5px"/>
      </div>
    </div>`).join("");

  document.getElementById("modal-body").innerHTML = `
    <div class="modal-field">
      <label>Status Entitas</label>
      <select id="edit-status">${statusOpts}</select>
    </div>
    <div class="modal-field">
      <label>Fase Aktif (1-5)</label>
      <select id="edit-fase">${[1,2,3,4,5].map(n=>`<option${n===e.fase?" selected":""}>${n}</option>`).join("")}</select>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#5a6a7a;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px">Status per Fungsi</div>
      ${divFields}
    </div>
    <div class="modal-field">
      <label>Output yang sudah bisa dipegang (pisah dengan enter)</label>
      <textarea id="edit-output">${e.output.join("\n")}</textarea>
    </div>
    <div class="modal-field">
      <label>Blocker / Penghambat (pisah dengan enter)</label>
      <textarea id="edit-blocker">${e.blocker.join("\n")}</textarea>
    </div>
    <div class="modal-field">
      <label>Next Action</label>
      <input id="edit-next" value="${e.nextAction}"/>
    </div>`;
}

function saveEdit() {
  if (editingIdx === null) {
    // save meta only
    META.periode = document.getElementById("edit-periode")?.value || META.periode;
    META.catatan = document.getElementById("edit-catatan")?.value || META.catatan;
    META.lastUpdate = new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  } else {
    const e = ENTITIES[editingIdx];
    e.status = document.getElementById("edit-status").value;
    e.fase = parseInt(document.getElementById("edit-fase").value);
    e.divisi.forEach((d,di) => {
      d.status = document.getElementById(`div-${di}-status`).value;
      d.note = document.getElementById(`div-${di}-note`).value;
    });
    e.output = document.getElementById("edit-output").value.split("\n").map(s=>s.trim()).filter(Boolean);
    e.blocker = document.getElementById("edit-blocker").value.split("\n").map(s=>s.trim()).filter(Boolean);
    e.nextAction = document.getElementById("edit-next").value;
    META.lastUpdate = new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  }
  closeEdit();
  renderAll();
}

function closeEdit() {
  document.getElementById("modal").classList.remove("open");
  editingIdx = null;
}

// close modal on overlay click
document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this) closeEdit();
});

// ── INIT ──────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
